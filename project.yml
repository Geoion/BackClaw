name: BackClaw
options:
  bundleIdPrefix: com.backclaw
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
schemes:
  BackClaw:
    build:
      targets:
        BackClaw: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BackClawTests
targets:
  BackClaw:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Domain
      - path: Services
      - path: Storage
      - path: Features
      - path: Resources
        excludes:
          - Info.plist
          - BackClaw.entitlements
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/en.lproj
        buildPhase: resources
      - path: Resources/zh-Hans.lproj
        buildPhase: resources
      - path: Resources/zh-Hant.lproj
        buildPhase: resources
      - path: Resources/ja.lproj
        buildPhase: resources
      - path: Resources/ko.lproj
        buildPhase: resources
      - path: Resources/de.lproj
        buildPhase: resources
      - path: Resources/es.lproj
        buildPhase: resources
      - path: Resources/it.lproj
        buildPhase: resources
      - path: Resources/ru.lproj
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: BackClaw
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026 BackClaw"
        LSMinimumSystemVersion: "14.0"
    entitlements:
      path: Resources/BackClaw.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.backclaw.app
        PRODUCT_NAME: BackClaw
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/BackClaw.entitlements
        ENABLE_HARDENED_RUNTIME: true
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_PREVIEWS: NO
        SWIFT_ENABLE_INJECT_BUILD_TOOLS: NO
        DEPLOYMENT_POSTPROCESSING: YES
        SKIP_INSTALL: NO

  BackClawTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: BackClaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.backclaw.app.tests
        GENERATE_INFOPLIST_FILE: YES
